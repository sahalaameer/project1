<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login As</title>

    <style>
      * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
}

/* LAYOUT */
.container {
    display: flex;
    height: 100vh;
    width: 100%;
}

/* LEFT IMAGE */
.left {
    width: 50%;
    position: relative;
}

.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* SOFT OVERLAY (light, not dark) */
.left::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.1);
}

/* RIGHT SIDE */
.right {
    width: 50%;
    height: 100vh; /* full height */
    
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #f8fafc, #eef2f7);
}

/* BOX */
.box {
    height: 100%;          /* 🔥 same height as image */
    width: 100%;
    max-width: 420px;      /* keep readable */

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    padding: 60px;
    border-radius: 0;      /* remove card feel */

    background: transparent;  /* remove box look */
    box-shadow: none;
}

.box:hover {
    transform: translateY(-5px);
}

/* TITLE */
h2 {
    margin-bottom: 10px;
    color: #222;
    font-size: 26px;
    font-weight: 600;
    text-align: center;
}

/* SUBTEXT */
.subtext {
    color: #777;
    margin-bottom: 25px;
    font-size: 14px;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    margin: 10px 0;

    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;

    font-size: 15px;
    font-weight: 500;

    border: none;
    border-radius: 10px;
    cursor: pointer;

    background: linear-gradient(to right, #0f766e, #14b8a6);
    color: white;

    box-shadow: 0 4px 12px rgba(20,184,166,0.3);
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(20,184,166,0.4);
}

.btn:active {
    transform: scale(0.96);
}
.right{
    width: 50%;
    height: 100vh;
    position: relative;

    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #f8fafc, #eef2f7);
}

.footer{
  position:absolute;
  bottom:20px;
  left:0;
  width:100%;
  text-align:center;
  padding:10px;
  font-size:14px;
  background:transparent;
}

.footer a{
  margin:0 12px;
  color:#0f766e;
  text-decoration:none;
  font-weight:500;
}

.footer a:hover{
  text-decoration:underline;
}
    </style>
</head>
<body>
<div class="container">

    <!-- LEFT IMAGE -->
    <div class="left">
        <img src="new.jpg" alt="Background">
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="box">
            <h2>Login As</h2>

            <button type="button" class="btn" onclick="goToLogin('student')">🎓 Student</button>
            <button type="button" class="btn" onclick="goToLogin('faculty')">👩‍🏫 Faculty</button>
            <button type="button" class="btn" onclick="goToLogin('parent')">👨‍👩‍👧 Parent</button>
        </div>
        <div class="footer">
  <a href="#">Privacy Policy</a>
  <a href="#">Help</a>
  <a href="https://www.scmsgroup.org" target="_blank">SCMS Website</a>
</div>
    </div>

</div>


<script>
    function goToLogin(role) {
        window.location.href = "index.html?role=" + role;
    }
</script>

</body>
</html>
