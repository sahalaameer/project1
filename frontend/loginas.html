<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login As</title>

    <style>
        body {
            font-family: Arial, sans-serif;

           
            background-image: url("new.jpg");  
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px;
            width: 350px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 30px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #008080;
            color: white;
        }

        .btn:hover {
            background-color: #006666;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login As</h2>

    <button class="btn" onclick="goToLogin('student')">🎓 Student</button>
    <button class="btn" onclick="goToLogin('faculty')">👩‍🏫 Faculty</button>
    <button class="btn" onclick="goToLogin('parent')">👨‍👩‍👧 Parent</button>
</div>

<script>
    function goToLogin(role) {
        window.location.href = "index.html?role=" + role;
    }
</script>

</body>
</html>
